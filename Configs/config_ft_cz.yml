log_dir: "Models/FT_CZ"
save_freq: 2
log_interval: 10
device: "cpu"
epochs: 100
batch_size: 1 # Set to 1 for CPU testing
max_len: 400 # Increased for longer segments if needed

preprocess_params:
  sr: 24000
  spectrogram_params:
    n_fft: 2048
    win_length: 1200
    hop_length: 300

model_params:
  multispeaker: true
  dim_in: 64 
  hidden_dim: 512
  max_conv_dim: 512
  n_layer: 3 # Matched to LibriTTS
  n_mels: 80
  n_token: 178 # number of phoneme tokens
  max_dur: 50 # maximum duration of a single phoneme
  style_dim: 128 # style vector size
  dropout: 0.2
  n_style_adv: 4

  decoder: 
      type: 'hifigan' # Matched to LibriTTS
      resblock_kernel_sizes: [3,7,11]
      upsample_rates : [10, 5, 3, 2]
      upsample_initial_channel: 512
      resblock_dilation_sizes: [[1,3,5], [1,3,5], [1,3,5]]
      upsample_kernel_sizes: [20, 10, 6, 4]
      
  slm:
      model: 'microsoft/wavlm-base-plus'
      sr: 16000 # sampling rate of SLM
      hidden: 768 # hidden size of SLM
      nlayers: 13 # number of layers of SLM
      initial_channel: 64 # initial channels of SLM discriminator head
  
  diffusion:
    embedding_mask_proba: 0.1
    transformer:
      num_layers: 3
      num_heads: 8
      head_features: 64
      multiplier: 2
    dist:
      sigma_data: 0.19926648961191362 
      estimate_sigma_data: true
      mean: -3.0
      std: 1.0

loss_params:
    lambda_mel: 5.0 # mel-reconstruction loss
    lambda_gen: 1.0 # generator loss
    lambda_slm: 1.0 # SLM loss
    lambda_mono: 1.0 # monotonic alignment loss (for text-aligner)
    lambda_s2s: 1.0 # sequence-to-sequence loss (for text-aligner)
    lambda_F0: 1.0 # F0 reconstruction loss
    lambda_norm: 1.0 # norm reconstruction loss
    lambda_dur: 1.0 # duration loss
    lambda_sty: 1.0 # style reconstruction loss
    lambda_diff: 1.0 # diffusion loss
    lambda_kl: 1.0 # KL divergence loss
    lambda_ce: 20.0 # CE loss
    
    diff_epoch: 0
    joint_epoch: 0

optimizer_params:
  lr: 0.0001
  bert_lr: 0.00001
  ft_lr: 0.0001

slmadv_params:
  min_len: 400
  max_len: 500
  batch_percentage: 0.5
  iter: 10
  thresh: 5
  scale: 0.01
  sig: 1.5

data_params:
  train_data: "Data/train_list.txt"
  val_data: "Data/val_list.txt"
  root_path: "Data/wavs"
  OOD_data: "Data/OOD_texts.txt"
  min_length: 50 # min length of mel frames

# Pretrained Models
ASR_config: "Utils/ASR/config.yml"
ASR_path: "Utils/ASR/epoch_00080.pth"
F0_path: "Utils/JDC/bst.t7"
PLBERT_dir: "Utils/PLBERT/"

pretrained_model: "Models/LibriTTS/epochs_2nd_00020.pth"
second_stage_load_pretrained: true
load_only_params: true
